<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Flappy Anna 3D</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      canvas { display: block; }

      #ui-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 10;
        font-family: 'Georgia', serif;
      }

      #title-screen, #gameover-screen {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        text-align: center; color: #fff; text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
      }

      #title-screen h1 {
        font-size: clamp(32px, 8vw, 72px); letter-spacing: 6px;
        margin-bottom: 16px; color: #ffddaa;
      }
      #title-screen p {
        font-size: clamp(14px, 3vw, 24px); opacity: 0.9; margin: 8px 0;
      }
      #title-screen .credit {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        font-size: 14px; opacity: 0.6; color: #ccc;
      }
      #gameover-screen h2 {
        font-size: clamp(28px, 7vw, 56px); color: #ffaaaa;
        margin-bottom: 12px;
      }
      #gameover-screen p {
        font-size: clamp(14px, 3vw, 22px); opacity: 0.8;
      }
      #score-display {
        position: absolute; top: 20px; right: 30px;
        font-size: clamp(24px, 5vw, 48px); color: #fff;
        text-shadow: 2px 2px 6px rgba(0,0,0,0.6); letter-spacing: 3px;
      }
      #fps-display {
        position: absolute; top: 20px; left: 20px;
        font-size: 14px; color: #aaa; font-family: monospace;
      }
      .blink { animation: blink 1s ease-in-out infinite; }
      @keyframes blink {
        0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
      }
      .hidden { display: none !important; }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-D7FGGT11T3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-D7FGGT11T3');
    </script>
  </head>
  <body>
    <div id="ui-layer">
      <div id="title-screen">
        <h1>FLAPPY ANNA 3D</h1>
        <p class="blink">PRESS SPACE OR TAP</p>
        <p style="font-size: 16px; opacity: 0.7;">Presented by Guan, Made in Melb with DeepSeek and Love</p>
      </div>
      <div id="gameover-screen" class="hidden">
        <h2>GAME OVER</h2>
        <p class="blink">PRESS SPACE OR TAP</p>
      </div>
      <div id="score-display" class="hidden">0000</div>
      <div id="fps-display"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
